<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Scratch Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF8C1A;        /* Scratch motion-block orange */
    --purple: #855CD6;        /* Scratch looks-block purple */
    --blue: #4C97FF;          /* Scratch events-block blue */
    --ink: #1C2540;           /* deep navy text */
    --paper: #FDF8F1;         /* warm page background */
    --card: #FFFFFF;
    --shadow: 0 6px 0 rgba(28, 37, 64, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
  }

  /* ---------- Header ---------- */
  header {
    text-align: center;
    padding: 56px 20px 36px;
  }

  header h1 {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(2.2rem, 5vw, 3.4rem);
    letter-spacing: 0.5px;
  }

  header h1 .spark { color: var(--orange); }

  header p {
    margin-top: 10px;
    font-size: 1.05rem;
    color: rgba(28, 37, 64, 0.65);
    max-width: 520px;
    margin-inline: auto;
  }

  /* ---------- Grid ---------- */
  .arcade {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(485px, 100%), 1fr));
    gap: 48px 36px;
    max-width: 1180px;
    margin: 0 auto;
    padding: 12px 24px 80px;
    justify-items: center;
  }

  /* ---------- Game card, shaped like a Scratch block ---------- */
  .game {
    width: 100%;
    max-width: 505px;
    background: var(--card);
    border: 3px solid var(--ink);
    border-radius: 14px;
    box-shadow: var(--shadow);
    overflow: visible;
    position: relative;
  }

  /* The puzzle tab on top — the signature Scratch-block notch */
  .game::before {
    content: "";
    position: absolute;
    top: -14px;
    left: 34px;
    width: 56px;
    height: 14px;
    background: var(--tab, var(--orange));
    border: 3px solid var(--ink);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
  }

  /* Rotate accent colors across cards like Scratch block categories */
  .game:nth-child(3n+1) { --tab: var(--orange); }
  .game:nth-child(3n+2) { --tab: var(--blue); }
  .game:nth-child(3n+3) { --tab: var(--purple); }

  .game-title {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 1.25rem;
    padding: 14px 18px 12px;
    border-bottom: 3px solid var(--ink);
    background: var(--tab, var(--orange));
    color: #fff;
    border-radius: 11px 11px 0 0;
    text-shadow: 0 1px 0 rgba(0,0,0,0.15);
  }

  .game-frame {
    aspect-ratio: 485 / 402;
    width: 100%;
    background: #ECEFF4;
    border-radius: 0 0 11px 11px;
    overflow: hidden;
  }

  .game-frame iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  /* ---------- Footer ---------- */
  footer {
    text-align: center;
    padding: 0 20px 48px;
    font-size: 0.9rem;
    color: rgba(28, 37, 64, 0.5);
  }

  footer a { color: var(--purple); font-weight: 700; }

  @media (prefers-reduced-motion: no-preference) {
    .game { transition: transform 0.15s ease; }
    .game:hover { transform: translateY(-4px); }
  }
</style>
</head>
<body>

<header>
  <h1>My Scratch <span class="spark">Arcade</span></h1>
  <p>A collection of games built in Scratch. Click the green flag on any game to play!</p>
</header>

<main class="arcade" id="arcade"></main>

<footer>
  Made with <a href="https://scratch.mit.edu" target="_blank" rel="noopener">Scratch</a> · Hosted on GitHub Pages
</footer>

<script>
  /* ============================================================
     ADD YOUR GAMES HERE
     Each game needs a title and its Scratch project ID.
     The ID is the number in the project URL:
     https://scratch.mit.edu/projects/60917032/  ->  id: "60917032"
     ============================================================ */
  const games = [
    { title: "Paper Minecraft",   id: "10128407" },
    { title: "Geometry Dash",     id: "105500895" },
    { title: "Appel",             id: "60917032" },
    { title: "Scratchnapped",     id: "1206014" },
  ];

  const arcade = document.getElementById("arcade");

  games.forEach(game => {
    const card = document.createElement("article");
    card.className = "game";
    card.innerHTML = `
      <h2 class="game-title">${game.title}</h2>
      <div class="game-frame">
        <iframe
          src="https://scratch.mit.edu/projects/${game.id}/embed"
          loading="lazy"
          allowtransparency="true"
          allowfullscreen
          title="${game.title} — Scratch game">
        </iframe>
      </div>`;
    arcade.appendChild(card);
  });
</script>

</body>
</html>
