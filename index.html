<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jumping Over Stuff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF8C1A;        /* Scratch motion-block orange */
    --purple: #855CD6;        /* Scratch looks-block purple */
    --blue: #4C97FF;          /* Scratch events-block blue */
    --ink: #1C2540;           /* deep navy text */
    --paper: #FDF8F1;         /* warm page background */
    --card: #FFFFFF;
    --shadow: 0 6px 0 rgba(28, 37, 64, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
  }

  /* ---------- Header ---------- */
  header {
    text-align: center;
    padding: 56px 20px 36px;
  }

  header h1 {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(2.2rem, 5vw, 3.4rem);
    letter-spacing: 0.5px;
  }

  header h1 .spark { color: var(--orange); }

  header p {
    margin-top: 10px;
    font-size: 1.05rem;
    color: rgba(28, 37, 64, 0.65);
    max-width: 520px;
    margin-inline: auto;
  }

  /* ---------- Grid ---------- */
  .arcade {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(485px, 100%), 1fr));
    gap: 48px 36px;
    max-width: 1180px;
    margin: 0 auto;
    padding: 12px 24px 80px;
    justify-items: center;
  }

  /* ---------- Game card, shaped like a Scratch block ---------- */
  .game {
    width: 100%;
    max-width: 505px;
    background: var(--card);
    border: 3px solid var(--ink);
    border-radius: 14px;
    box-shadow: var(--shadow);
    overflow: visible;
    position: relative;
  }

  /* The puzzle tab on top — now shows who made the game */
  .game-tab {
    position: absolute;
    top: -26px;
    left: 34px;
    padding: 3px 14px 2px;
    background: var(--tab, var(--orange));
    border: 3px solid var(--ink);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    color: #fff;
    text-shadow: 0 1px 0 rgba(0,0,0,0.15);
    white-space: nowrap;
    text-decoration: none;
  }

  .game-tab:hover { text-decoration: underline; }

  .game-tab:focus-visible {
    outline: 3px solid var(--ink);
    outline-offset: 2px;
  }

  /* Rotate accent colors across cards like Scratch block categories */
  .game:nth-child(3n+1) { --tab: var(--orange); }
  .game:nth-child(3n+2) { --tab: var(--blue); }
  .game:nth-child(3n+3) { --tab: var(--purple); }

  .game-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 1.25rem;
    padding: 12px 14px 10px 18px;
    border-bottom: 3px solid var(--ink);
    background: var(--tab, var(--orange));
    color: #fff;
    border-radius: 11px 11px 0 0;
    text-shadow: 0 1px 0 rgba(0,0,0,0.15);
  }

  .fullscreen-btn {
    flex-shrink: 0;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    color: #fff;
    background: rgba(0,0,0,0.18);
    border: 2px solid #fff;
    border-radius: 8px;
    padding: 4px 12px;
    cursor: pointer;
  }

  .fullscreen-btn:hover { background: rgba(0,0,0,0.32); }

  .fullscreen-btn:focus-visible {
    outline: 3px solid var(--ink);
    outline-offset: 2px;
  }

  /* When a game goes fullscreen, fill the whole screen */
  .game-frame:fullscreen {
    border-radius: 0;
    background: #000;
  }
  .game-frame:fullscreen iframe { width: 100%; height: 100%; }

  .game-frame {
    aspect-ratio: 485 / 402;
    width: 100%;
    background: #ECEFF4;
    border-radius: 0 0 11px 11px;
    overflow: hidden;
  }

  .game-frame iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  /* ---------- Footer ---------- */
  footer {
    text-align: center;
    padding: 0 20px 48px;
    font-size: 0.9rem;
    color: rgba(28, 37, 64, 0.5);
  }

  footer a { color: var(--purple); font-weight: 700; }

  /* ---------- Corner note ---------- */
  .side-note {
    position: fixed;
    right: 16px;
    bottom: 16px;
    max-width: 210px;
    background: var(--card);
    border: 3px solid var(--ink);
    border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 10px 30px 10px 14px;
    font-size: 0.82rem;
    line-height: 1.35;
    color: var(--ink);
    z-index: 50;
  }

  .side-note strong { color: var(--purple); }

  .note-toggle {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    border: 2px solid var(--ink);
    border-radius: 6px;
    background: var(--paper);
    color: var(--ink);
    font-size: 0.9rem;
    font-weight: 700;
    line-height: 1;
    cursor: pointer;
  }

  .note-toggle:hover { background: #fff; }

  .note-toggle:focus-visible {
    outline: 3px solid var(--purple);
    outline-offset: 2px;
  }

  /* Collapsed: hide the text, shrink to just the button */
  .side-note.minimized {
    max-width: none;
    width: auto;
    padding: 6px;
  }

  .side-note.minimized .note-body { display: none; }

  .side-note.minimized .note-toggle {
    position: static;
  }

  @media (max-width: 640px) {
    .side-note {
      position: static;
      max-width: none;
      margin: 0 24px 32px;
    }
  }

  @media (prefers-reduced-motion: no-preference) {
    .game { transition: transform 0.15s ease; }
    .game:hover { transform: translateY(-4px); }
  }
</style>
</head>
<body>

<header>
  <h1>Jumping Over Stuff</h1>
</header>

<main class="arcade" id="arcade"></main>

<aside class="side-note" id="sideNote">
  <button class="note-toggle" id="noteToggle" type="button" aria-label="Minimize note" title="Minimize">–</button>
  <span class="note-body"><strong>Just added a game?</strong> New projects can take up to <strong>6 hours</strong> to appear here.</span>
</aside>

<footer>
  Made with <a href="https://scratch.mit.edu" target="_blank" rel="noopener">Scratch</a> · Hosted on GitHub Pages
</footer>

<script>
  /* ============================================================
     This site loads every project from your Scratch studio
     automatically. To add a game to the website, just add it
     to the studio on Scratch — no code changes needed.
     ============================================================ */
  const STUDIO_ID = "51730103";

  const arcade = document.getElementById("arcade");

  function addCard(title, id, username) {
    const card = document.createElement("article");
    card.className = "game";

    const tab = document.createElement("a");
    tab.className = "game-tab";
    tab.textContent = `by ${username}`;
    tab.href = `https://scratch.mit.edu/users/${username}/`;
    tab.target = "_blank";
    tab.rel = "noopener";
    tab.title = `See ${username}'s Scratch profile`;

    const heading = document.createElement("h2");
    heading.className = "game-title";

    const titleText = document.createElement("span");
    titleText.textContent = title;

    const fsBtn = document.createElement("button");
    fsBtn.className = "fullscreen-btn";
    fsBtn.type = "button";
    fsBtn.textContent = "⛶ Full screen";

    const frame = document.createElement("div");
    frame.className = "game-frame";

    const iframe = document.createElement("iframe");
    iframe.src = `https://scratch.mit.edu/projects/${id}/embed`;
    iframe.loading = "lazy";
    iframe.allowFullscreen = true;
    iframe.title = `${title} — Scratch game`;

    fsBtn.addEventListener("click", () => {
      if (frame.requestFullscreen) {
        frame.requestFullscreen();
      } else if (frame.webkitRequestFullscreen) {
        frame.webkitRequestFullscreen(); // Safari
      }
    });

    heading.appendChild(titleText);
    heading.appendChild(fsBtn);
    frame.appendChild(iframe);
    card.appendChild(tab);
    card.appendChild(heading);
    card.appendChild(frame);
    arcade.appendChild(card);
  }

  async function loadStudio() {
    let offset = 0;
    let found = 0;
    try {
      // Scratch's own API blocks browser requests from other websites,
      // so this goes through TurboWarp's trampoline proxy, a community
      // service built for exactly this purpose.
      while (true) {
        const res = await fetch(
          `https://trampoline.turbowarp.org/proxy/studios/${STUDIO_ID}/projects?offset=${offset}`
        );
        if (!res.ok) throw new Error(`API responded ${res.status}`);
        const projects = await res.json();
        if (!Array.isArray(projects) || projects.length === 0) break;

        projects.forEach(p => addCard(p.title, p.id, p.username));
        found += projects.length;
        offset += projects.length;
      }
      if (found === 0) {
        arcade.innerHTML =
          "<p style='grid-column: 1 / -1; text-align: center;'>No games in the studio yet. Add some projects to the studio on Scratch and refresh!</p>";
      }
    } catch (err) {
      arcade.innerHTML =
        "<p style='grid-column: 1 / -1; text-align: center;'>Couldn't load the games right now. Check that the studio exists and try refreshing.</p>";
      console.error("Failed to load studio projects:", err);
    }
  }

  loadStudio();

  // Minimize / expand the corner note
  const sideNote = document.getElementById("sideNote");
  const noteToggle = document.getElementById("noteToggle");
  noteToggle.addEventListener("click", () => {
    const minimized = sideNote.classList.toggle("minimized");
    if (minimized) {
      noteToggle.textContent = "?";
      noteToggle.setAttribute("aria-label", "Show note");
      noteToggle.title = "Show note";
    } else {
      noteToggle.textContent = "–";
      noteToggle.setAttribute("aria-label", "Minimize note");
      noteToggle.title = "Minimize";
    }
  });
</script>

</body>
</html>
