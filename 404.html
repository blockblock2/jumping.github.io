<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - File not found</title>
</head>
<body style="margin: 0; padding: 0;">
<div style="min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <div style="text-align: center; max-width: 600px;">
    <div style="position: relative; height: 200px; margin-bottom: 40px;">
      <svg width="100%" height="200" viewBox="0 0 300 200" style="display: block; margin: 0 auto;">
        <defs>
          <linearGradient id="mag-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color: #ffd700; stop-opacity: 1"/>
            <stop offset="100%" style="stop-color: #ffed4e; stop-opacity: 1"/>
          </linearGradient>
          <style>
            @keyframes search {
              0% { transform: translate(-80px, -80px); }
              50% { transform: translate(80px, 80px); }
              100% { transform: translate(-80px, -80px); }
            }
            .files {
              opacity: 0.6;
              animation: float 3s ease-in-out infinite;
            }
            @keyframes float {
              0%, 100% { transform: translateY(0px); }
              50% { transform: translateY(-10px); }
            }
            .magnifier {
              animation: search 4s ease-in-out infinite;
              transform-origin: center;
            }
          </style>
        </defs>
        <g class="files" style="animation-delay: 0s;">
          <rect x="20" y="20" width="30" height="40" rx="2" fill="none" stroke="white" stroke-width="2"/>
          <line x1="20" y1="32" x2="50" y2="32" stroke="white" stroke-width="1"/>
          <line x1="20" y1="40" x2="50" y2="40" stroke="white" stroke-width="1"/>
        </g>
        <g class="files" style="animation-delay: 0.3s;">
          <rect x="240" y="80" width="30" height="40" rx="2" fill="none" stroke="white" stroke-width="2"/>
          <line x1="240" y1="92" x2="270" y2="92" stroke="white" stroke-width="1"/>
          <line x1="240" y1="100" x2="270" y2="100" stroke="white" stroke-width="1"/>
        </g>
        <g class="files" style="animation-delay: 0.6s;">
          <rect x="100" y="140" width="30" height="40" rx="2" fill="none" stroke="white" stroke-width="2"/>
          <line x1="100" y1="152" x2="130" y2="152" stroke="white" stroke-width="1"/>
          <line x1="100" y1="160" x2="130" y2="160" stroke="white" stroke-width="1"/>
        </g>
        <g class="magnifier">
          <circle cx="150" cy="100" r="35" fill="url(#mag-gradient)" stroke="white" stroke-width="3"/>
          <circle cx="150" cy="100" r="30" fill="none" stroke="white" stroke-width="2"/>
          <line x1="175" y1="125" x2="200" y2="150" stroke="white" stroke-width="3" stroke-linecap="round"/>
        </g>
      </svg>
    </div>
    <h1 style="font-size: 48px; color: white; margin: 20px 0 10px; font-weight: 600;">404</h1>
    <p style="font-size: 28px; color: white; margin: 0 0 30px; font-weight: 500;">Where did I put that file?</p>
    <p style="font-size: 16px; color: rgba(255, 255, 255, 0.9); margin: 0 0 40px; line-height: 1.6;">The page you're looking for seems to have gone missing. Let's head back and try again.</p>
    <a href="/" style="display: inline-block; padding: 12px 32px; background: white; color: #667eea; text-decoration: none; border-radius: 8px; font-weight: 500; font-size: 16px; transition: transform 0.2s, box-shadow 0.2s;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 8px 16px rgba(0,0,0,0.2)';" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none';">Back to home</a>
  </div>
</div>
</body>
</html>
