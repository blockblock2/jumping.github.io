<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratch Follower Counter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 500px;
      padding: 40px;
    }

    h1 {
      font-size: 28px;
      color: #2d3748;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .subtitle {
      color: #718096;
      font-size: 14px;
      margin-bottom: 32px;
    }

    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .result-card {
      display: none;
      background: #f7fafc;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      animation: slideIn 0.3s ease-out;
    }

    .result-card.show {
      display: block;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .username {
      color: #718096;
      font-size: 14px;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .follower-count {
      font-size: 56px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
    }

    .follower-label {
      color: #a0aec0;
      font-size: 13px;
      margin-top: 8px;
    }

    .profile-link {
      margin-top: 16px;
    }

    .profile-link a {
      display: inline-block;
      color: #667eea;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .profile-link a:hover {
      background: #edf2f7;
    }

    .error-message {
      display: none;
      background: #fed7d7;
      border-left: 4px solid #fc8181;
      color: #c53030;
      padding: 16px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .error-message.show {
      display: block;
      animation: slideIn 0.3s ease-out;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 24px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e2e8f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: #718096;
      font-size: 14px;
    }

    @media (max-width: 480px) {
      .container {
        padding: 24px;
      }

      h1 {
        font-size: 24px;
      }

      .follower-count {
        font-size: 42px;
      }

      .search-box {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Scratch Followers</h1>
    <p class="subtitle">Check how many followers any Scratch user has</p>

    <div class="search-box">
      <input 
        type="text" 
        id="username" 
        placeholder="Enter a username"
        autocomplete="off"
      >
      <button onclick="searchUser()">Search</button>
    </div>

    <div class="error-message" id="error"></div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">Fetching data...</div>
    </div>

    <div class="result-card" id="result">
      <div class="username" id="display-username"></div>
      <p class="follower-count" id="follower-count">0</p>
      <div class="follower-label">followers</div>
      <div class="profile-link">
        <a id="profile-url" href="#" target="_blank">View on Scratch →</a>
      </div>
    </div>
  </div>

  <script>
    const usernameInput = document.getElementById('username');
    const searchBtn = document.querySelector('button');
    const errorEl = document.getElementById('error');
    const loadingEl = document.getElementById('loading');
    const resultEl = document.getElementById('result');

    // Allow Enter key to search
    usernameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchUser();
    });

    async function searchUser() {
      const username = usernameInput.value.trim();

      if (!username) {
        showError('Please enter a username');
        return;
      }

      hideAll();
      loadingEl.classList.add('show');

      try {
        const response = await fetch(
          `https://api.scratch.mit.edu/users/${username}/followers`
        );

        if (!response.ok) {
          if (response.status === 404) {
            showError(`User "${username}" not found`);
          } else {
            showError('Failed to fetch follower data');
          }
          return;
        }

        const followers = await response.json();
        const count = Array.isArray(followers) ? followers.length : 0;

        // Display result
        loadingEl.classList.remove('show');
        document.getElementById('display-username').textContent = `@${username}`;
        document.getElementById('follower-count').textContent = count.toLocaleString();
        document.getElementById('profile-url').href = `https://scratch.mit.edu/users/${username}/`;
        resultEl.classList.add('show');

      } catch (err) {
        showError(`Error: ${err.message}`);
      }
    }

    function showError(message) {
      hideAll();
      errorEl.textContent = message;
      errorEl.classList.add('show');
    }

    function hideAll() {
      errorEl.classList.remove('show');
      loadingEl.classList.remove('show');
      resultEl.classList.remove('show');
    }
  </script>
</body>
</html>
